<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LexEase – Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root {
  --overlay-dark: rgba(62, 44, 35, 0.85);
  --surface-glass: rgba(255,255,255,0.08);
  --border-subtle: rgba(255,255,255,0.18);
  --text-main: #ffffff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:"Angsana New", serif;
  color:var(--text-main);
  overflow:hidden;
}

.background-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.video-overlay{
  position:fixed;
  inset:0;
  background:var(--overlay-dark);
  z-index:-1;
}

.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.page-inner{
  max-width:1100px;
  width:100%;
  margin:0 auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.top-bar{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:12px 0 18px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}

.avatar-wrapper{
  position:absolute;
  left:0;
}

.avatar-circle{
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  border:1px solid rgba(255,255,255,0.3);
  background:radial-gradient(circle at 30% 20%, rgba(214,194,176,0.35), rgba(0,0,0,0.4));
  cursor:pointer;
}

.avatar-dropdown{
  position:absolute;
  top:55px;
  left:0;
  width:150px;
  border-radius:12px;
  background:rgba(30,20,15,0.95);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
  overflow:hidden;
  transform:translateY(-10px);
  opacity:0;
  pointer-events:none;
  transition:all 0.25s ease;
}

.avatar-dropdown.active{
  transform:translateY(0);
  opacity:1;
  pointer-events:auto;
}

.dropdown-item{
  padding:12px 16px;
  font-size:15px;
  cursor:pointer;
}

.dropdown-item:hover{
  background:rgba(255,255,255,0.1);
}

.nav-welcome{
  font-size:22px;
  font-weight:700;
}

.search-shell{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:500px;
}

.search-card{
  width:100%;
  max-width:850px;
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px 20px;
  border-radius:24px;
  border:1px solid var(--border-subtle);
  background:linear-gradient(135deg,var(--surface-glass),rgba(255,255,255,0.12));
  backdrop-filter:blur(18px);
  box-shadow:0 20px 45px rgba(0,0,0,0.6);
}

.search-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:18px;
}

.analyze-button{
  padding:10px 26px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.35);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

.analyze-button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
</style>
</head>
<body>

<video class="background-video" autoplay muted loop playsinline>
  <source src="images/video.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="page">
<div class="page-inner">

<header class="top-bar">
  <div class="avatar-wrapper">
    <div class="avatar-circle" id="avatar">D</div>
    <div class="avatar-dropdown" id="avatarDropdown">
      <div class="dropdown-item" id="logoutBtn">Logout</div>
    </div>
  </div>

  <div class="nav-welcome">
    Welcome back, Devyan
  </div>
</header>

<section class="search-shell">
  <div class="search-card">
    <input 
      type="text" 
      class="search-input"
      id="legal-input"
      placeholder="Describe what you want to analyze…" 
    />
    <button class="analyze-button" id="analyze-btn">
      Analyze
    </button>
  </div>
</section>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const avatar = document.getElementById("avatar");
  const dropdown = document.getElementById("avatarDropdown");
  const logoutBtn = document.getElementById("logoutBtn");
  const analyzeBtn = document.getElementById("analyze-btn");
  const inputField = document.getElementById("legal-input");

  avatar.addEventListener("click", function(e){
    e.stopPropagation();
    dropdown.classList.toggle("active");
  });

  document.addEventListener("click", function(){
    dropdown.classList.remove("active");
  });

  logoutBtn.addEventListener("click", function(){
    window.location.href = "home.html";
  });

  analyzeBtn.addEventListener("click", function(){

    const userText = inputField.value.trim();

    if(userText === ""){
      alert("Please enter something to analyze.");
      return;
    }

    analyzeBtn.textContent = "Analyzing...";
    analyzeBtn.disabled = true;

    localStorage.setItem("analysisInput", userText);

    setTimeout(function(){
      window.location.href = "output.html";
    }, 1200);

  });

});
</script>

</body>
</html>
