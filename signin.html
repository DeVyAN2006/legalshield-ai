<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LexEase – Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --lexease-primary: #3e2c23;
      --lexease-secondary: #6f4e37;
      --lexease-accent: #b08968;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Angsana New", serif;
      background-color: var(--lexease-primary);
      color: var(--lexease-primary);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background-color: #ffffff;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
      padding: 36px 32px;
    }

    .auth-card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-weight: 700;
      font-size: 30px;
      letter-spacing: 0.5px;
      color: var(--lexease-primary);
    }

    .field-group {
      margin-top: 16px;
    }

    .field-input {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid rgba(62, 44, 35, 0.18);
      padding: 0 16px;
      font-family: "Angsana New", serif;
      font-size: 18px;
      color: var(--lexease-primary);
      background-color: #ffffff;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--lexease-accent);
      box-shadow: 0 0 0 2px rgba(176, 137, 104, 0.2);
    }

    .forgot-password {
      margin-top: 12px;
      text-align: right;
      font-size: 16px;
      color: var(--lexease-secondary);
    }

    .forgot-password a {
      color: var(--lexease-secondary);
      text-decoration: none;
    }

    .primary-button {
      margin-top: 24px;
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: none;
      background-color: var(--lexease-primary);
      color: #ffffff;
      font-family: "Angsana New", serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-title">Sign in to continue</div>
      </div>

      <form id="loginForm">
        <div class="field-group">
          <input
            class="field-input"
            type="email"
            name="email"
            placeholder="Email"
            required
          />
        </div>

        <div class="field-group">
          <input
            class="field-input"
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <div class="forgot-password">
          <a href="#">Forgot password?</a>
        </div>

        <button class="primary-button" type="submit">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault(); 
      window.location.href = "AfterLogin.html";
    });
  </script>
</body>
</html>
