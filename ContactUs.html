<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LexEase – Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --lexease-primary: #3e2c23;
      --lexease-primary-dark: #2c1f18;
      --lexease-primary-light: #4c372a;
      --surface: #ffffff;
      --surface-soft: #f7f3ee;
      --text-main: #2b1a13;
      --text-muted: #756257;
      --border-subtle: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Angsana New", serif;
      background-color: var(--lexease-primary);
      color: var(--surface);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .contact-wrapper {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }

    .contact-heading {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .contact-subtitle {
      max-width: 520px;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.82);
    }

    .contact-card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(145deg, var(--surface) 0%, var(--surface-soft) 100%);
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      padding: 32px 28px;
      text-align: left;
    }

    .contact-card-inner {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-row {
      display: flex;
      gap: 16px;
    }

    .field {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }

    .field-input,
    .field-textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(62, 44, 35, 0.18);
      padding: 10px 14px;
      font-family: "Angsana New", serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text-main);
      background-color: #ffffff;
      transition:
        border-color 0.18s ease-out,
        box-shadow 0.18s ease-out,
        background-color 0.18s ease-out;
    }

    .field-input::placeholder,
    .field-textarea::placeholder {
      color: rgba(117, 98, 87, 0.76);
    }

    .field-input:focus,
    .field-textarea:focus {
      outline: none;
      border-color: var(--lexease-primary-light);
      box-shadow: 0 0 0 2px rgba(75, 55, 42, 0.2);
      background-color: #ffffff;
    }

    .field-textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .submit-button {
      min-width: 160px;
      height: 48px;
      padding: 0 24px;
      border-radius: 10px;
      border: none;
      background-color: var(--lexease-primary-dark);
      color: #ffffff;
      font-family: "Angsana New", serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition:
        background-color 0.18s ease-out,
        box-shadow 0.18s ease-out,
        transform 0.12s ease-out;
    }

    .submit-button:hover {
      background-color: var(--lexease-primary-light);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .submit-button:active {
      transform: translateY(1px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 640px) {
      .contact-wrapper {
        gap: 20px;
      }

      .contact-heading {
        font-size: 32px;
      }

      .contact-card {
        padding: 24px 20px;
        border-radius: 10px;
      }

      .field-row {
        flex-direction: column;
      }

      .actions {
        justify-content: center;
      }

      .submit-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="contact-wrapper">
      <div class="contact-heading">Contact Us</div>
      <div class="contact-subtitle">
        Share your questions, feedback, or collaboration ideas and we’ll get back to you shortly.
      </div>

      <div class="contact-card">
        <form class="contact-card-inner">
          <div class="field-row">
            <div class="field">
              <div class="field-label">Full Name</div>
              <input
                class="field-input"
                type="text"
                name="fullName"
                placeholder="Enter your full name"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <div class="field-label">Email Address</div>
              <input
                class="field-input"
                type="email"
                name="email"
                placeholder="you@example.com"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <div class="field-label">Subject</div>
              <input
                class="field-input"
                type="text"
                name="subject"
                placeholder="How can we help?"
              />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <div class="field-label">Message</div>
              <textarea
                class="field-textarea"
                name="message"
                placeholder="Write your message here"
              ></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="submit-button" type="submit">
              Send Message
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
