<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --lexease-primary: #3e2c23;
    }
  </style>
</head>

<body class="text-white" style="background-color: var(--lexease-primary);">

  <!-- Navbar -->
  <nav class="flex items-center px-8 py-6">
    <img src="images/logo.jpeg" 
         alt="LexEase Logo" 
         class="h-20 w-auto rounded-xl">
  </nav>

  <!-- Our Mission -->
  <section class="py-24 px-8">
    <div class="max-w-4xl mx-auto text-center">
      
      <h2 class="text-4xl font-bold mb-8">Our Mission</h2>
      
      <p class="text-white/80 leading-relaxed text-lg">
        Our mission is to make legal information easy to understand.
        LexEase uses AI to simplify complex legal documents so people can read,
        understand, and make informed decisions with confidence.
      </p>

    </div>
  </section>

  <!-- Meet The Team -->
  <section class="py-24 px-8 bg-white/5">
    <div class="max-w-6xl mx-auto text-center">

      <h2 class="text-4xl font-bold mb-16">Meet the Team</h2>

      <div class="grid md:grid-cols-4 gap-12">

        <div>
          <img src="images/devyan.jpeg"
               alt="Devyan"
               class="w-32 h-32 mx-auto rounded-full object-cover mb-6">
          <h3 class="text-xl font-semibold">Devyan</h3>
        </div>

        <div>
          <img src="images/tanishq.jpeg"
               alt="Tanishq"
               class="w-32 h-32 mx-auto rounded-full object-cover mb-6">
          <h3 class="text-xl font-semibold">Tanishq</h3>
        </div>

        <div>
          <img src="images/yash.jpeg"
               alt="Yash"
               class="w-32 h-32 mx-auto rounded-full object-cover mb-6">
          <h3 class="text-xl font-semibold">Yash</h3>
        </div>

        <div>
          <img src="images/kavyansh.jpeg"
               alt="Kavyansh"
               class="w-32 h-32 mx-auto rounded-full object-cover mb-6">
          <h3 class="text-xl font-semibold">Kavyansh</h3>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
